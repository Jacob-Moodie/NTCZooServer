        <!DOCTYPE html>
        <html lang="en">
        <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>JavaScript zoo 3</title>
            <link rel="stylesheet" href="Styles.css">
            <script type="module" src="./js/script.js"></script>
            <script src="js/tv4.min.js"></script>
        </head>
        <body>
              <div id="animalApi">
              <h1 id="animalApiName">Loading Animal Value</h1>
              <h2 id="animalApiData"></h2>
            </div>
            <div id="container">
                <h1>Animals!</h1>
            <section id="animalCard">
            </section>
            <form id="addStorageAnimalForm">
              <input id="animalName" type="text" placeholder="Animal name" required />
              <input id="animalSpecies" type="text" placeholder="Species" required />
              <input id="animalAge" type="number" placeholder="Age" required />
              <button type="submit" id="animalStorageSubmit">Add Animal</button>

            </form>
              <form id="removeStorageAnimalForm">
              <input id="removeAnimalName" type="text" placeholder="Animal name" required />
              <button type="submit">Remove Animal</button>
            </form>

            <ul id="animalList"></ul>
            <section id="interactive">
            <h2></h2>
            <div id="zooCount"></div>
            <div id="elementContainer"></div>
            <p id="errorMessage">No messages yet.</p>
            <div id="zooStatusIndicator"></div>
            <div id="dashboardStatus"></div>
            <div id="dashboardVisitors"></div>
            <button id="openStatus">Open Status</button>
            <button id="closedStatus">Closed Status</button>
            <button id="updateHealth">Heal Animals</button>
            <button id="visitorButton">Add Visitor</button>
              <form action="" id="memberForm" novalidate>
                <h2>Member Form</h2>
                <div class="field">
                <label for="memberName">Name*</label>
                <input type="text" name="memberName" id="memberName" required />
                </div>

                <div class="field">
                <label for="email">Email*</label>
                <input type="email" name="email" id="email" required />
                </div>

                
                <div class="field">
                <label for="membershipType">Membership Type*</label>
                <input type="text" name="membershipType" id="membershipType" list="membershipTypeList" required />
                <datalist id="membershipTypeList"></datalist>
                </div>

                
                <div class="field">
                <label for="memberStartDate">Start Date*</label>
                <input type="date" name="memberStartDate" id="memberStartDate" required />
                </div>

                <div class="field">
                <label for="membereContact">Emergency Contact Information*</label>
                <textarea id="membereContact"></textarea>
                </div>

                <input type="hidden" id="memberCSRFToken" name="memberCSRFToken">
                <button type="submit" id="memberSubmit">Submit</button> 

              </form>
                <h2> Visitor Form</h2>
                <form action="" id="visitForm" novalidate>
    
                <div class="field">
                <label for="visitorName">Name*</label>
                <input type="text" name="visitorName" id="visitorName" required />
                </div>

                <div class="field">
                <label for="selectAnimal">Select Animal*</label>
                <input type="text" name="selectAnimal" id="selectAnimal" required list="animalList"/>
                <datalist id="animalList"></datalist>
                </div>


                <div class="field">
                <label for="visitDate">Date*</label>
                <input type="date" name="visitDate" id="visitDate" required />
                </div>

                <div class="field">
                <label for="groupSize">Group*</label>
                <input type="number" name="groupSize" id="groupSize" min="1" required />
                </div>
                <input type="hidden" id="visitorCSRFToken" name="visitorCSRFToken">
                <button type="submit" id="animalVisitorSubmit">Submit</button>
              </form>


              <form action="" id="XSSvisitorForm">

                <h2>Secure Contact Form</h2>
    
                <div class="field">
                <label for="XSScontactName">Name*</label>
                <input type="text" name="XSScontactName" id="XSScontactName" required/>
                </div>

                <div class="field">
                <label for="XSSvisitorEmail">Email*</label>
                <input type="email" name="XSSvisitorEmail" id="XSSvisitorEmail" required/>                </div>
                </div>

                <div class="field">
                <label for="XSSvisitorMessage">Message</label>
                <input type="text" name="XSSvisitorMessage" id="XSSvisitorMessage" />
                </div>

                <button type="submit" id="XSSvisitorSubmit">Submit</button>
              </form>

              <form action="" id="XSRFvisitorForm">

                <h2>XRSF Testing Form</h2>
    
                <div class="field">
                <label for="XSRFcontactName">Name*</label>
                <input type="text" name="XSRFcontactName" id="XSRFcontactName" required/>
                </div>

                <div class="field">
                <label for="XSRFvisitorEmail">Email*</label>
                <input type="email" name="XSRFvisitorEmail" id="XSRFvisitorEmail" required/>
                </div>


                <div class="field">
                <label for="XSRFvisitorMessage">Message</label>
                <input type="text" name="XSRFvisitorMessage" id="XSRFvisitorMessage" />
                </div>

                <input type="hidden" id="csrfToken" name="csrfToken">
                <div id="xssOutput"></div>

                <button type="submit" id="XRFvisitorSubmit">Submit</button>
              </form>

              <form action="" id="SQLvisitorForm">

                <h2>SQL Testing Form</h2>
    
                <div class="field">
                <label for="SQLcontactName">Name*</label>
                <input type="text" name="SQLFcontactName" id="SQLFcontactName" maxlength="35" required/>
                </div>

                <div class="field">
                <label for="SQLvisitorEmail">Email*</label>
                <input type="email" name="SQLFvisitorEmail" id="SQLFvisitorEmail" maxlength="50" required novalidate/>
                </div>


                <div class="field">
                <label for="SQLvisitorMessage">Message</label>
                <input type="text" name="SQLFvisitorMessage" id="SQLFvisitorMessage" maxlength="250" />
                </div>

                <button type="submit" id="XRFvisitorSubmit">Submit</button>
              </form>
                
            </div>
        </body>
        </html>
